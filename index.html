<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden}
  #gameCanvas{display:block;margin:0 auto;cursor:none}
  #ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Orbitron',monospace}
  #hud{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:flex-start;padding:0 16px}
  .stat-box{background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.15);padding:6px 12px;border-radius:4px;min-width:90px;text-align:center}
  .stat-label{font-size:9px;color:#666;letter-spacing:2px;text-transform:uppercase}
  .stat-value{font-size:18px;font-weight:700;color:#fff;line-height:1.2}
  #nitro-bar-wrap{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:200px;text-align:center}
  #nitro-bar-wrap .stat-label{color:#0ff;margin-bottom:4px;display:block;font-size:9px;letter-spacing:2px}
  #nitro-bar-bg{background:rgba(0,255,255,0.1);border:1px solid #0ff4;border-radius:3px;height:8px;overflow:hidden}
  #nitro-bar-fill{height:100%;background:linear-gradient(90deg,#00ffff,#00ff88);width:100%;transition:width 0.1s;border-radius:3px}
  #speedometer{position:absolute;bottom:16px;right:20px;width:80px;text-align:center}
  #speed-val{font-size:28px;font-weight:900;color:#ff3366;line-height:1}
  #speed-unit{font-size:9px;color:#666;letter-spacing:2px}
  #controls-hint{position:absolute;bottom:14px;left:16px;font-size:9px;color:#333;letter-spacing:1px;line-height:1.8;font-family:'Share Tech Mono',monospace}
  #combo-display{position:absolute;top:80px;left:50%;transform:translateX(-50%);font-size:32px;font-weight:900;color:#ffff00;text-shadow:0 0 20px #ff0;opacity:0;transition:opacity 0.3s;pointer-events:none}
  #message-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
  #overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);pointer-events:all;font-family:'Orbitron',monospace}
  #overlay h1{font-size:42px;font-weight:900;letter-spacing:6px;margin-bottom:8px}
  #overlay .sub{font-size:11px;letter-spacing:4px;color:#555;margin-bottom:40px}
  #overlay .btn{border:1px solid currentColor;padding:12px 36px;font-family:'Orbitron',monospace;font-size:13px;letter-spacing:3px;cursor:pointer;background:transparent;margin:6px;border-radius:3px;transition:all 0.2s;pointer-events:all}
  #overlay .btn:hover{background:rgba(255,255,255,0.1);transform:scale(1.05)}
  #overlay .score-line{font-size:13px;letter-spacing:3px;margin:8px 0;color:#888}
  #overlay .big-score{font-size:52px;font-weight:900;margin:12px 0}
  .lives-display{display:flex;gap:6px;align-items:center}
  .heart{font-size:16px}
  #police-warning{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;font-weight:700;letter-spacing:4px;color:#ff0000;text-shadow:0 0 10px #f00;opacity:0;pointer-events:none;font-family:'Orbitron',monospace}
  #weather-indicator{position:absolute;top:12px;left:50%;transform:translateX(-50%);margin-top:0;font-size:9px;letter-spacing:2px;color:#444;font-family:'Share Tech Mono',monospace}
</style>

<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="hud">
    <div class="stat-box">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="scoreVal">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="bestVal">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Level</div>
      <div class="stat-value" id="levelVal">1</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Lives</div>
      <div class="lives-display" id="livesVal"><span class="heart">♥</span><span class="heart">♥</span><span class="heart">♥</span></div>
    </div>
  </div>
  <div id="nitro-bar-wrap">
    <span class="stat-label">NITRO</span>
    <div id="nitro-bar-bg"><div id="nitro-bar-fill"></div></div>
  </div>
  <div id="speedometer">
    <div id="speed-val">0</div>
    <div id="speed-unit">KM/H</div>
  </div>
  <div id="controls-hint">A/D or ←/→ Move<br>W or ↑ NITRO<br>Q Quit</div>
  <div id="combo-display" id="combo">x1</div>
  <div id="police-warning">⚠ POLICE INCOMING</div>
  <div id="weather-indicator" id="weatherLabel">CLEAR DAY</div>
  <div id="overlay" id="mainOverlay">
    <h1 style="color:#00ffcc">OVERDRIVE</h1>
    <div class="sub">ULTIMATE STREET RACER</div>
    <button class="btn" style="color:#00ffcc" onclick="startGame()">START ENGINE</button>
  </div>
</div>

<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=600,H=700;
canvas.width=W;canvas.height=H;
canvas.style.maxWidth='100%';

const LANES=[W/2-140,W/2,W/2+140];
const ROAD_L=W/2-180,ROAD_R=W/2+180;

let state='menu';
let score=0,best=0,lives=3,level=1,combo=1,comboTimer=0;
let playerX,playerY,playerLane,playerSpeed,playerW=36,playerH=60;
let nitro,nitroCharge,nitroCooldown,nitroActive;
let enemies=[],particles=[],roadLines=[],pickups=[];
let police={x:0,y:-100,lane:0,active:false,visible:false,timer:0};
let roadY=0,roadSpeed=3;
let shakeX=0,shakeY=0,shakeMag=0;
let isNight=false,weather='clear';
let rainDrops=[];
let frameCount=0,lastScore=0;
let comboEl=document.getElementById('combo-display');
let policeWarn=document.getElementById('police-warning');
let weatherLabel=document.getElementById('weather-indicator');
let scoreVal=document.getElementById('scoreVal');
let bestVal=document.getElementById('bestVal');
let levelVal=document.getElementById('levelVal');
let livesVal=document.getElementById('livesVal');
let nitroFill=document.getElementById('nitro-bar-fill');
let speedVal=document.getElementById('speed-val');
let overlay=document.getElementById('mainOverlay');

const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.key]=false);

function initGame(){
  score=0;lives=3;level=1;combo=1;comboTimer=0;
  playerLane=1;
  playerX=LANES[playerLane];playerY=H-100;
  playerSpeed=0;
  nitro=false;nitroCharge=100;nitroCooldown=0;nitroActive=false;
  enemies=[];particles=[];pickups=[];
  police={x:LANES[0],y:-80,lane:0,active:false,visible:false,timer:0};
  roadY=0;roadSpeed=3;
  isNight=false;weather='clear';rainDrops=[];
  frameCount=0;lastScore=0;
  updateHUD();
}

function startGame(){
  overlay.style.display='none';
  state='playing';
  initGame();
  loop();
}
window.startGame=startGame;

function spawnEnemy(){
  let lane=Math.floor(Math.random()*3);
  let types=['car','truck','bike'];
  let t=Math.random()<0.6?'car':Math.random()<0.5?'truck':'bike';
  let colors=['#ff3333','#ff9900','#cc44ff','#ff66aa','#44aaff','#ffcc00'];
  enemies.push({
    x:LANES[lane],y:-60,lane,
    type:t,
    w:t==='truck'?40:t==='bike'?20:32,
    h:t==='truck'?80:t==='bike'?40:55,
    speed:roadSpeed*0.7+Math.random()*0.5,
    color:colors[Math.floor(Math.random()*colors.length)],
    frame:0
  });
}

function spawnPickup(){
  let lane=Math.floor(Math.random()*3);
  let types=['nitro','star','shield'];
  let t=types[Math.floor(Math.random()*types.length)];
  pickups.push({x:LANES[lane],y:-30,lane,type:t,frame:0});
}

function spawnParticle(x,y,vx,vy,color,life,size){
  particles.push({x,y,vx,vy,color,life,maxLife:life,size:size||4});
}

function explosion(x,y,big){
  let n=big?60:30;
  for(let i=0;i<n;i++){
    let angle=Math.random()*Math.PI*2;
    let spd=Math.random()*(big?8:5)+1;
    let colors=['#ff4400','#ff8800','#ffcc00','#ffffff','#ff2200'];
    spawnParticle(x,y,Math.cos(angle)*spd,Math.sin(angle)*spd,
      colors[Math.floor(Math.random()*colors.length)],big?50:35,Math.random()*5+2);
  }
  if(big){shakeMag=14;}else{shakeMag=7;}
}

function nitroTrail(x,y){
  for(let i=0;i<3;i++){
    spawnParticle(x+(Math.random()-0.5)*10,y+playerH/2,
      (Math.random()-0.5)*2,Math.random()*4+2,'#00ffff',15,Math.random()*4+2);
  }
}

function drawCar(x,y,w,h,color,isPlayer,isPolice,frame){
  ctx.save();
  ctx.translate(x,y);
  if(isPlayer&&nitroActive){
    ctx.shadowBlur=20;ctx.shadowColor='#00ffff';
  }
  if(isPolice){
    ctx.shadowBlur=14;
    ctx.shadowColor=frame%20<10?'#ff0000':'#0044ff';
  }
  // body
  ctx.fillStyle=color;
  roundRect(-w/2,-h/2,w,h,6);
  ctx.fill();
  // roof
  ctx.fillStyle=darken(color,0.6);
  roundRect(-w/2+4,-h/2+10,w-8,h*0.45,4);
  ctx.fill();
  // windshield
  ctx.fillStyle='rgba(120,220,255,0.7)';
  roundRect(-w/2+5,-h/2+12,w-10,h*0.2,3);
  ctx.fill();
  // headlights
  if(isPlayer||isNight){
    ctx.fillStyle='#ffffaa';
    ctx.fillRect(-w/2+3,-h/2+2,8,5);
    ctx.fillRect(w/2-11,-h/2+2,8,5);
  }
  // taillights
  ctx.fillStyle='#ff2200';
  ctx.fillRect(-w/2+2,h/2-8,7,4);
  ctx.fillRect(w/2-9,h/2-8,7,4);
  // police light bar
  if(isPolice){
    ctx.fillStyle=frame%20<10?'#ff0000':'#0044ff';
    ctx.fillRect(-w/2+2,-h/2-4,w-4,5);
  }
  ctx.restore();
}

function drawTruck(x,y,w,h,color,frame){
  ctx.save();ctx.translate(x,y);
  ctx.fillStyle=color;
  roundRect(-w/2,-h/2,w,h,5);ctx.fill();
  ctx.fillStyle=darken(color,0.7);
  roundRect(-w/2+2,-h/2+5,w-4,h*0.3,3);ctx.fill();
  ctx.fillStyle='rgba(120,220,255,0.6)';
  roundRect(-w/2+3,-h/2+7,w-6,h*0.2,2);ctx.fill();
  ctx.fillStyle='#ff2200';
  ctx.fillRect(-w/2+2,h/2-7,8,4);ctx.fillRect(w/2-10,h/2-7,8,4);
  ctx.restore();
}

function drawBike(x,y,color){
  ctx.save();ctx.translate(x,y);
  ctx.strokeStyle=color;ctx.lineWidth=3;
  ctx.beginPath();ctx.ellipse(0,12,10,12,0,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(0,-12,10,12,0,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=color;
  ctx.fillRect(-4,-8,8,16);
  ctx.restore();
}

function drawRoad(){
  let skyGrad=ctx.createLinearGradient(0,0,0,H);
  if(isNight){
    skyGrad.addColorStop(0,weather==='storm'?'#0a0010':'#050510');
    skyGrad.addColorStop(1,'#0a0010');
  }else{
    skyGrad.addColorStop(0,weather==='storm'?'#2a2030':'#1a1a2e');
    skyGrad.addColorStop(1,'#111');
  }
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,H);

  // stars at night
  if(isNight){
    ctx.fillStyle='rgba(255,255,255,0.7)';
    for(let i=0;i<80;i++){
      let sx=((i*137+frameCount*0.1)%W);
      let sy=((i*97)%(H*0.5));
      ctx.fillRect(sx,sy,1,1);
    }
  }

  // road surface
  let roadGrad=ctx.createLinearGradient(ROAD_L,0,ROAD_R,0);
  roadGrad.addColorStop(0,'#1a1a1a');
  roadGrad.addColorStop(0.3,'#222');
  roadGrad.addColorStop(0.7,'#222');
  roadGrad.addColorStop(1,'#1a1a1a');
  ctx.fillStyle=roadGrad;
  ctx.fillRect(ROAD_L,0,ROAD_R-ROAD_L,H);

  // road edges with glow
  ctx.strokeStyle=isNight?'#ff8800':'#ff8800';
  ctx.lineWidth=3;
  ctx.shadowBlur=isNight?15:6;ctx.shadowColor='#ff8800';
  ctx.beginPath();ctx.moveTo(ROAD_L,0);ctx.lineTo(ROAD_L,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ROAD_R,0);ctx.lineTo(ROAD_R,H);ctx.stroke();
  ctx.shadowBlur=0;

  // lane dividers
  let dashH=40,dashGap=30;
  for(let i=0;i<2;i++){
    let lx=LANES[i]+70;
    let offset=roadY%(dashH+dashGap);
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;ctx.setLineDash([dashH,dashGap]);
    ctx.lineDashOffset=-offset;
    ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.stroke();
    ctx.setLineDash([]);
  }

  // road markings / perspective lines for depth
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.moveTo(W/2,H);
    ctx.lineTo(ROAD_L+i*(ROAD_R-ROAD_L)/4,0);
    ctx.stroke();
  }
}

function drawPickup(p){
  ctx.save();ctx.translate(p.x,p.y);
  let glow=Math.sin(frameCount*0.1)*5+8;
  ctx.shadowBlur=glow*2;
  if(p.type==='nitro'){ctx.shadowColor='#00ffff';ctx.fillStyle='#00ffff';}
  else if(p.type==='star'){ctx.shadowColor='#ffff00';ctx.fillStyle='#ffff00';}
  else{ctx.shadowColor='#00ff88';ctx.fillStyle='#00ff88';}
  ctx.font='bold 22px monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.type==='nitro'?'⚡':p.type==='star'?'★':'🛡',0,0);
  ctx.restore();
}

function drawRain(){
  ctx.strokeStyle='rgba(120,160,255,0.3)';ctx.lineWidth=1;
  for(let d of rainDrops){
    ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-2,d.y+12);ctx.stroke();
  }
}

function drawHUD(){
  if(nitroActive){
    ctx.save();
    ctx.strokeStyle='rgba(0,255,255,0.15)';ctx.lineWidth=6;
    ctx.strokeRect(0,0,W,H);
    ctx.restore();
  }
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function darken(hex,f){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`;
}

function updateHUD(){
  scoreVal.textContent=score;
  bestVal.textContent=best;
  levelVal.textContent=level;
  let hearts='';for(let i=0;i<3;i++)hearts+=`<span class="heart" style="opacity:${i<lives?1:0.15}">♥</span>`;
  livesVal.innerHTML=hearts;
  nitroFill.style.width=nitroCharge+'%';
  let spd=Math.floor(roadSpeed*30+combo*5);
  speedVal.textContent=spd;
  if(nitroActive){nitroFill.style.background='linear-gradient(90deg,#00ffff,#ffffff)';nitroFill.style.boxShadow='0 0 8px #0ff';}
  else{nitroFill.style.background='linear-gradient(90deg,#00ffff,#00ff88)';nitroFill.style.boxShadow='none';}
}

let laneMoveCooldown=0;
function handleInput(){
  let moved=false;
  if((keys['a']||keys['A']||keys['ArrowLeft'])&&playerLane>0&&laneMoveCooldown<=0){playerLane--;laneMoveCooldown=10;moved=true;}
  if((keys['d']||keys['D']||keys['ArrowRight'])&&playerLane<2&&laneMoveCooldown<=0){playerLane++;laneMoveCooldown=10;moved=true;}
  if(laneMoveCooldown>0)laneMoveCooldown--;
  if((keys['w']||keys['W']||keys['ArrowUp'])&&nitroCharge>5&&!nitroCooldown){
    nitroActive=true;
  }else{
    nitroActive=false;
  }
  if((keys['q']||keys['Q'])){state='gameover';showGameOver();}
}

function update(){
  frameCount++;
  roadY=(roadY+roadSpeed)%H;

  // Level up
  level=Math.floor(score/300)+1;
  roadSpeed=3+level*0.4+combo*0.1;

  // Day/night
  isNight=Math.floor(score/500)%2===1;

  // Weather
  let ws=Math.floor(score/700)%3;
  if(ws===0)weather='clear';else if(ws===1)weather='rain';else weather='storm';
  weatherLabel.textContent=(isNight?'NIGHT ':'DAY ')+weather.toUpperCase();
  if(weather!=='clear'){
    while(rainDrops.length<(weather==='storm'?120:60))rainDrops.push({x:Math.random()*W,y:Math.random()*H});
    for(let d of rainDrops){d.y+=weather==='storm'?14:8;d.x-=weather==='storm'?3:1;if(d.y>H){d.y=0;d.x=Math.random()*W;}}
  }else{rainDrops=[];}

  // Nitro
  if(nitroActive&&nitroCharge>0){
    nitroCharge-=1.2;
    if(nitroCharge<=0){nitroCharge=0;nitroActive=false;nitroCooldown=120;}
    nitroTrail(playerX,playerY);
  }else{
    nitroActive=false;
    if(nitroCooldown>0){nitroCooldown--;}
    else if(nitroCharge<100){nitroCharge+=0.25;}
  }

  // Player
  let targetX=LANES[playerLane];
  playerX+=(targetX-playerX)*0.18;
  playerY=H-100;

  // Enemies
  let spawnRate=Math.max(30,80-level*5);
  if(frameCount%spawnRate===0)spawnEnemy();
  let speedMult=nitroActive?1.8:1;
  for(let e of enemies){
    e.y+=roadSpeed*speedMult-e.speed;
    e.frame++;
  }
  enemies=enemies.filter(e=>e.y<H+100);

  // Police
  if(score>0&&score%400===0&&!police.active&&score!==lastScore){
    police.active=true;police.visible=true;police.y=-80;police.lane=Math.floor(Math.random()*3);police.x=LANES[police.lane];
    policeWarn.style.opacity=1;setTimeout(()=>policeWarn.style.opacity=0,2000);
    lastScore=score;
  }
  if(police.active){
    police.timer++;
    if(police.lane<playerLane&&police.timer%3===0)police.lane=Math.min(2,police.lane+1);
    else if(police.lane>playerLane&&police.timer%3===0)police.lane=Math.max(0,police.lane-1);
    police.x+=(LANES[police.lane]-police.x)*0.08;
    police.y+=roadSpeed*speedMult+(level>3?2:1);
    police.frame=police.frame||0;police.frame++;
    if(police.y>H+100){police.active=false;police.visible=false;}
  }

  // Pickups
  if(frameCount%180===0)spawnPickup();
  for(let p of pickups){p.y+=roadSpeed*0.8;p.frame++;}
  pickups=pickups.filter(p=>p.y<H+50);

  // Pickup collision
  pickups=pickups.filter(p=>{
    let dx=Math.abs(p.x-playerX),dy=Math.abs(p.y-playerY);
    if(dx<30&&dy<40){
      if(p.type==='nitro'){nitroCharge=Math.min(100,nitroCharge+50);for(let i=0;i<20;i++)spawnParticle(p.x,p.y,(Math.random()-0.5)*6,Math.random()*-5,'#00ffff',25,4);}
      else if(p.type==='star'){score+=50;combo=Math.min(combo+1,8);comboTimer=180;showCombo();}
      else if(p.type==='shield'){lives=Math.min(3,lives+1);}
      return false;
    }
    return true;
  });

  // Combo timer
  if(comboTimer>0){comboTimer--;if(comboTimer<=0){combo=1;}}

  // Collision
  let hit=false;
  for(let e of enemies){
    let dx=Math.abs(e.x-playerX),dy=Math.abs(e.y-playerY);
    let ew=e.w/2+playerW/2-4;
    let eh=e.h/2+playerH/2-4;
    if(dx<ew&&dy<eh){hit=true;break;}
  }
  if(police.active){
    let dx=Math.abs(police.x-playerX),dy=Math.abs(police.y-playerY);
    if(dx<34&&dy<50)hit=true;
  }
  if(hit){
    explosion(playerX,playerY,true);
    enemies=[];
    police.active=false;police.visible=false;
    lives--;combo=1;comboTimer=0;
    updateHUD();
    if(lives<=0){
      setTimeout(()=>{state='gameover';showGameOver();},800);
    }
  }

  // Score
  score+=nitroActive?2:1;
  if(score>best)best=score;

  // Particles
  for(let p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;}
  particles=particles.filter(p=>p.life>0);

  // Shake decay
  if(shakeMag>0){shakeX=(Math.random()-0.5)*shakeMag;shakeY=(Math.random()-0.5)*shakeMag;shakeMag*=0.85;if(shakeMag<0.5){shakeMag=0;shakeX=0;shakeY=0;}}

  updateHUD();
}

function showCombo(){
  comboEl.textContent='x'+combo+' COMBO!';
  comboEl.style.opacity=1;
  clearTimeout(comboEl._t);
  comboEl._t=setTimeout(()=>comboEl.style.opacity=0,800);
}

function draw(){
  ctx.save();
  if(shakeMag>0)ctx.translate(shakeX,shakeY);
  drawRoad();
  if(weather!=='clear')drawRain();

  // Pickups
  for(let p of pickups)drawPickup(p);

  // Enemies
  for(let e of enemies){
    if(e.type==='truck')drawTruck(e.x,e.y,e.w,e.h,e.color,e.frame);
    else if(e.type==='bike')drawBike(e.x,e.y,e.color);
    else drawCar(e.x,e.y,e.w,e.h,e.color,false,false,e.frame);
  }

  // Police
  if(police.active){
    drawCar(police.x,police.y,36,60,'#1144cc',false,true,police.frame);
  }

  // Player
  let pc=nitroActive?'#00ffff':'#00ff88';
  drawCar(playerX,playerY,playerW,playerH,pc,true,false,frameCount);

  // Particles
  for(let p of particles){
    let a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=p.color;
    ctx.shadowBlur=6;ctx.shadowColor=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  // Nitro speed lines
  if(nitroActive){
    ctx.strokeStyle='rgba(0,255,255,0.12)';ctx.lineWidth=1.5;
    for(let i=0;i<12;i++){
      let lx=ROAD_L+Math.random()*(ROAD_R-ROAD_L);
      let ly=Math.random()*H;
      let len=Math.random()*60+20;
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx,ly+len);ctx.stroke();
    }
  }

  drawHUD();
  ctx.restore();
}

function showGameOver(){
  overlay.style.display='flex';
  overlay.innerHTML=`
    <div style="color:#ff3366;font-size:11px;letter-spacing:4px;margin-bottom:8px">GAME OVER</div>
    <div class="big-score" style="color:#fff">${score}</div>
    <div class="score-line">BEST: ${best}</div>
    <div class="score-line" style="margin-bottom:24px">LEVEL ${level} REACHED</div>
    <button class="btn" style="color:#00ffcc" onclick="startGame()">RETRY</button>
  `;
}

let animId;
function loop(){
  if(state!=='playing')return;
  update();
  draw();
  animId=requestAnimationFrame(loop);
}

// Touch controls
let touchStartX=null;
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(touchStartX!==null){
    let dx=e.changedTouches[0].clientX-touchStartX;
    if(Math.abs(dx)<20){keys['w']=true;setTimeout(()=>keys['w']=false,300);}
    else if(dx<-20&&playerLane>0){playerLane--;laneMoveCooldown=10;}
    else if(dx>20&&playerLane<2){playerLane++;laneMoveCooldown=10;}
    touchStartX=null;
  }
},{passive:false});
</script>
